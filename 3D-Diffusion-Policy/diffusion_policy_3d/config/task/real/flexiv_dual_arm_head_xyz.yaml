name: flexiv_dual_arm_head_xyz

task_name: flexiv_dual_arm_head_xyz

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [2048, 3]
      type: point_cloud
    agent_pos:
      shape: [28]
      type: low_dim
  action:
    shape: [14]

env_runner: null

dataset:
  _target_: diffusion_policy_3d.dataset.flexiv_dual_arm_dataset.FlexivDualArmDataset
  zarr_path: data/flexiv_dual_arm_head_xyz.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 90
  task_name: ${task_name}
  expected_state_dim: 28
  expected_action_dim: 14
  expected_pointcloud_dim: 3
  expected_num_points: 2048
  normalizer_schema: flexiv_physical_v1
  clip_actions_to_execution_limits: true
  action_xyz_limit: 0.02
  action_rotation_limit: 0.04
  state_joint_range_floor: 0.20
  state_ee_position_range_floor: 0.10
  state_ee_rotation_range_floor: 0.20
  normalizer_quantile_low: 0.005
  normalizer_quantile_high: 0.995
