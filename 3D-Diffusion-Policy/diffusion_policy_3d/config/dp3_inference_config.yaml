# Default Flexiv dual-arm DP3 deployment configuration.
# Run with: bash scripts/run_flexiv_dual_arm_dp3_inference.sh

# Select the policy family stored in checkpoint.path.
algorithm: simple_dp3 # simple_dp3 | dp3
algorithm_profiles:
  simple_dp3:
    policy_target: diffusion_policy_3d.policy.simple_dp3.SimpleDP3
    horizon: 8
    n_action_steps: 4
    down_dims: [512, 1024, 2048]
  dp3:
    policy_target: diffusion_policy_3d.policy.dp3.DP3
    horizon: 16
    n_action_steps: 8
    down_dims: [512, 1024, 2048]

# -----------------------------------------------------------------------------
# Model structure and inference rollout configuration.
# Architecture/shape/diffusion-training fields must match the checkpoint.
# n_action_steps is inference-only within 1..(horizon - n_obs_steps + 1).
# -----------------------------------------------------------------------------
shape_meta:
  obs:
    point_cloud:
      shape: [2048, 3]
      type: point_cloud
    agent_pos:
      shape: [34]
      type: low_dim
  action:
    shape: [14]

flexiv_contract:
  state_schema: flexiv_abs_rot6d_v2
  normalizer_schema: flexiv_abs_rot6d_v2
  state_rotation_representation: rotation_6d
  state_rotation_reference: absolute_rdk_world_base
  rotation6d_convention: matrix_columns_0_1
  action_rotation_representation: rotvec

policy:
  _target_: ${algorithm_profiles.${algorithm}.policy_target}
  horizon: ${algorithm_profiles.${algorithm}.horizon}
  n_obs_steps: 2
  n_action_steps: ${algorithm_profiles.${algorithm}.n_action_steps}
  obs_as_global_cond: true

  # Kept for official-config compatibility. Real-data cropping is controlled by
  # pointcloud.config and this flag is not consumed by the DP3 policy class.
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  diffusion_step_embed_dim: 128
  down_dims: ${algorithm_profiles.${algorithm}.down_dims}
  # Retained for official-config compatibility; DP3Encoder currently ignores
  # image crop shape because this policy consumes point clouds, not RGB images.
  crop_shape: null
  encoder_output_dim: 64
  kernel_size: 5
  n_groups: 8

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    # Inference-only output clipping; it may differ from the training config.
    clip_sample: true
    prediction_type: epsilon

  use_pc_color: false
  pointnet_type: pointnet
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: 64
    use_layernorm: true
    final_norm: layernorm
    # Legacy PointNet option accepted through **kwargs but unused by this encoder.
    normal_channel: false

# Select EMA or raw model weights from the checkpoint payload. This need not
# equal training.use_ema when the requested weights exist in the checkpoint.
use_ema: true

# -----------------------------------------------------------------------------
# Inference-only parameters.
# -----------------------------------------------------------------------------
checkpoint:
  path: outputs/flexiv_dual_arm_head_xyz-simple_dp3-abs-rot6d-v2_seed1000/checkpoints/latest.ckpt

robot:
  # Copy flexiv_runtime.example.yaml to the gitignored local path, fill the
  # hardware serials, or override this with FLEXIV_DP3_ROBOT_CONFIG.
  config: ${oc.env:FLEXIV_DP3_ROBOT_CONFIG,third_party/real/dual_flexiv_rizon4s/configs/flexiv_runtime.local.yaml}
  # Match the Le-nero Flexiv deployment contract. Each startup/runtime
  # behavior is controlled independently. The true values below authorize
  # automatic enable, fault clear, Home, tool switch, and gripper initialization
  # when the normal inference command connects to the real robot.
  enable_on_connect: true
  clear_fault_on_connect: true
  go_home_on_connect: true
  switch_tool_on_connect: true
  initialize_gripper_on_connect: true
  switch_cartesian_mode_on_connect: true
  use_cartesian_servo_thread: false
  camera_name: head_rgb
  camera_fps: 30

pointcloud:
  config: third_party/real/dual_flexiv_rizon4s/configs/data_config.yaml

inference:
  gpu_id: 0
  device: cuda:0
  # Run until Ctrl+C or the stop file is created.
  duration_seconds: null
  # Execute the configured SimpleDP3 action chunk at the 10 Hz deployment rate,
  # matching Le-nero's queue semantics and the official MultiStepWrapper.
  rate_hz: 10
  action_mode: chunk # receding | chunk
  # Training remains DDPM/epsilon. Deployment uses DDIM built from the stored
  # DDPM beta schedule so 10 denoising steps retain quality at about 40 ms.
  scheduler: ddim # checkpoint | ddim
  num_inference_steps: 10
  # Discarded zero-input forwards run before robot.connect() to initialize CUDA
  # kernels without sending actions and prevent first-cycle cold-start trips.
  policy_warmup_steps: 2
  # Also discard synthetic PointCloudBuilder/FFS forwards before robot.connect().
  # This absorbs TensorRT and point-cloud CUDA cold start outside the safety loop.
  pointcloud_warmup_steps: 2
  log_dir: logs
  log_level: INFO
  stop_file: /tmp/stop_flexiv_dp3_inference

  # Post-policy action scaling and clipping.
  low_speed_scale: 1 # (0, 1]; increase carefully if trained deltas are too small
  max_cartesian_delta: 0.01 # positive xyz delta-norm limit per arm and cycle
  max_rotation_delta: 0.02 # positive rotvec delta-norm limit per arm and cycle

  # Runtime watchdogs. They stop inference on stale observations or overruns.
  max_policy_latency_ms: 250
  max_camera_frame_age_ms: 1000
  max_action_age_ms: 500
  max_send_duration_ms: 500
  max_loop_overrun_ms: 250
  # A single transient overrun skips that action chunk and immediately
  # re-predicts from a fresh observation. Repeated overruns still stop safely.
  max_consecutive_timing_skips: 3

# Control-chain trace for offline jitter analysis. With the Cartesian servo
# thread enabled it records every smoothed high-rate command; with the thread
# disabled it records each direct NRT command (command equals accumulated
# target). Both modes also record policy delta and actual TCP feedback into a
# separate *_control_trace.jsonl sidecar. JSON encoding and disk writes run in a
# background thread; control producers never block on a full queue. Actual TCP
# feedback is sampled independently at 50 Hz to limit RDK lock contention.
control_debug:
  enabled: true
  feedback_hz: 50
  queue_size: 8192
  flush_interval_sec: 1.0

visualization:
  enabled: true
  rate_hz: 2
  max_raw_points: 30000
  max_cropped_points: 30000
  point_size: 3
