defaults:
  - task: sim/adroit_hammer
  - _self_

# Select the official DP3 or SimpleDP3 policy implementation.
algorithm: simple_dp3 # simple_dp3 | dp3
algorithm_profiles:
  simple_dp3:
    policy_target: diffusion_policy_3d.policy.simple_dp3.SimpleDP3
    horizon: 4
    n_action_steps: 3
    down_dims: [128, 256, 384]
    num_epochs: 600
    lr_warmup_steps: 50
  dp3:
    policy_target: diffusion_policy_3d.policy.dp3.DP3
    horizon: 16
    n_action_steps: 8
    down_dims: [512, 1024, 2048]
    num_epochs: 3000
    lr_warmup_steps: 500

name: train_${algorithm}
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: debug

# -----------------------------------------------------------------------------
# Train/inference consistency contract.
# Keep the corresponding fields in dp3_inference_config.yaml identical. The
# inference launcher validates them against the configuration stored in ckpt.
# -----------------------------------------------------------------------------
horizon: ${algorithm_profiles.${algorithm}.horizon}
n_obs_steps: 2
n_action_steps: ${algorithm_profiles.${algorithm}.n_action_steps}
obs_as_global_cond: true

policy:
  _target_: ${algorithm_profiles.${algorithm}.policy_target}
  shape_meta: ${shape_meta}
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  obs_as_global_cond: ${obs_as_global_cond}

  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  diffusion_step_embed_dim: 128
  down_dims: ${algorithm_profiles.${algorithm}.down_dims}
  crop_shape: [80, 80]
  encoder_output_dim: 64
  kernel_size: 5
  n_groups: 8

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: sample

  use_pc_color: false
  pointnet_type: pointnet
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false

# -----------------------------------------------------------------------------
# Training-only parameters.
# num_inference_steps intentionally does not live in this file.
# -----------------------------------------------------------------------------
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0

ema:
  _target_: diffusion_policy_3d.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: false

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  betas: [0.95, 0.999]
  eps: 0.00000001
  weight_decay: 0.000001

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: false
  lr_scheduler: cosine
  lr_warmup_steps: ${algorithm_profiles.${algorithm}.lr_warmup_steps}
  num_epochs: ${algorithm_profiles.${algorithm}.num_epochs}
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 200
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${training.seed}
  project: dp3
  resume: true
  tags: [dp3]

checkpoint:
  save_ckpt: true
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: true
  save_every_ckpt: true
  save_every_ckpt_format_str: 'epoch={epoch:04d}-global_step={global_step}.ckpt'
  save_last_snapshot: false

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
