defaults:
  # Change this to real/flexiv_dual_arm_head_xyzrgb for XYZRGB training.
  - task: real/flexiv_dual_arm_head_xyz
  - _self_

# Shell-launch settings read by scripts/train_flexiv_dual_arm_dp3.sh before
# train.py starts. Keep training.device=cuda:0: CUDA_VISIBLE_DEVICES maps this
# physical GPU to cuda:0 inside the training process.
launcher:
  gpu_id: 0
  overwrite: false

# Select the official DP3 or SimpleDP3 policy implementation.
algorithm: simple_dp3 # simple_dp3 | dp3
algorithm_profiles:
  simple_dp3:
    policy_target: diffusion_policy_3d.policy.simple_dp3.SimpleDP3
    # Match the prior LeRobot DP temporal contract and U-Net capacity while
    # keeping the lighter SimpleDP3 implementation for the 16 GB RTX 5080.
    horizon: 8
    n_action_steps: 5
    down_dims: [512, 1024, 2048]
    # 5199 train sequences / batch 32 = 163 steps per epoch.
    # 245 epochs gives about 39935 optimizer steps, matching the prior DP run.
    num_epochs: 400
    lr_warmup_steps: 500
  dp3:
    policy_target: diffusion_policy_3d.policy.dp3.DP3
    horizon: 16
    n_action_steps: 8
    down_dims: [512, 1024, 2048]
    num_epochs: 3000
    lr_warmup_steps: 500

name: train_${algorithm}
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: ${task.name}-${algorithm}-10ep-physical-norm-v1
run_dir: 3D-Diffusion-Policy/outputs/${exp_name}_seed${training.seed}

# Real-data settings. Prefer an absolute zarr_path. When switching the task in
# defaults to xyzrgb, update this path to the corresponding XYZRGB zarr.
task:
  dataset:
    zarr_path: /home/deepcybo/.cache/dp3_zarr/flexiv_dual_arm_3d_pick_place_20260713_v05_head_xyz.zarr
    seed: ${training.seed}
    max_train_episodes: 50
    # Reconstruct the action actually accepted by the collection adapter, then
    # normalize both arms with one physical command contract. These limits are
    # the collection-time vector-norm limits, not the tighter deployment guard.
    normalizer_schema: flexiv_physical_v1
    clip_actions_to_execution_limits: true
    action_xyz_limit: 0.02
    action_rotation_limit: 0.04
    # Full-range floors keep static-arm encoder noise from defining [-1, 1].
    state_joint_range_floor: 0.20
    state_ee_position_range_floor: 0.10
    state_ee_rotation_range_floor: 0.20
    normalizer_quantile_low: 0.005
    normalizer_quantile_high: 0.995

# -----------------------------------------------------------------------------
# Checkpoint training contract.
# Architecture/shape/diffusion-training fields must match at inference. The
# inference rollout n_action_steps may differ within the official DP3 slice
# bound: 1 <= n_action_steps <= horizon - n_obs_steps + 1.
# -----------------------------------------------------------------------------
horizon: ${algorithm_profiles.${algorithm}.horizon}
n_obs_steps: 2
n_action_steps: ${algorithm_profiles.${algorithm}.n_action_steps}
obs_as_global_cond: true

policy:
  _target_: ${algorithm_profiles.${algorithm}.policy_target}
  shape_meta: ${shape_meta}
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  obs_as_global_cond: ${obs_as_global_cond}

  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  diffusion_step_embed_dim: 128
  down_dims: ${algorithm_profiles.${algorithm}.down_dims}
  # This policy consumes point clouds rather than RGB feature maps.
  crop_shape: null
  encoder_output_dim: 64
  kernel_size: 5
  n_groups: 8

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    prediction_type: epsilon

  use_pc_color: ${eval:'${task.dataset.expected_pointcloud_dim} == 6'}
  pointnet_type: pointnet
  pointcloud_encoder_cfg:
    in_channels: ${task.dataset.expected_pointcloud_dim}
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false

# -----------------------------------------------------------------------------
# Training-only parameters.
# num_inference_steps intentionally does not live in this file.
# -----------------------------------------------------------------------------
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0

ema:
  _target_: diffusion_policy_3d.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 32
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 32
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: false

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  betas: [0.95, 0.999]
  eps: 0.00000001
  weight_decay: 0.000001

training:
  device: cuda:0
  seed: 1000
  debug: false
  resume: false
  lr_scheduler: cosine
  lr_warmup_steps: ${algorithm_profiles.${algorithm}.lr_warmup_steps}
  num_epochs: ${algorithm_profiles.${algorithm}.num_epochs}
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 200
  # 25 epochs x 163 steps/epoch = about 4075 optimizer steps per checkpoint.
  checkpoint_every: 25
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: 3d

  # 如果记录到个人默认空间，可以不写 entity。
  # 如果记录到团队项目，填写用户名或团队 slug。
  entity: key_z-bjtu

  group: ${exp_name}
  name: ${exp_name}-seed${training.seed}

  mode: online
  id: null
  resume: never

  tags:
    - dp3
    - flexiv
    - ${algorithm}
    - ${task_name}

checkpoint:
  save_ckpt: true
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: true
  save_every_ckpt: true
  save_every_ckpt_format_str: 'epoch={epoch:04d}-global_step={global_step}.ckpt'
  save_last_snapshot: false

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: ${run_dir}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
