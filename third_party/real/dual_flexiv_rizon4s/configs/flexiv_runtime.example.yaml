# Copy this file to flexiv_runtime.local.yaml and replace every placeholder.
# flexiv_runtime.local.yaml is gitignored because station serials are private.

robot:
  left_robot_sn: "Rizon4s-063173" # REPLACE_WITH_LEFT_ROBOT_SERIAL
  right_robot_sn: "Rizon4s-063278" # REPLACE_WITH_RIGHT_ROBOT_SERIAL
  use_gripper: true
  left_gripper_name: "Flexiv-GN01"
  right_gripper_name: "Flexiv-GN01"
  left_tool_name: "Flexiv-GN01-rs" # REPLACE_WITH_LEFT_TOOL_NAME
  right_tool_name: "Flexiv-GN01-rs" # REPLACE_WITH_RIGHT_TOOL_NAME
  switch_tool_on_connect: true
  initialize_gripper_on_connect: true
  open_grippers_on_connect: true
  gripper_min_width: 0.0
  gripper_max_open: 0.1
  gripper_speed: 0.2
  gripper_force: 10.0
  gripper_command_epsilon: 0.0005
  gripper_init_timeout_sec: 10.0
  gripper_init_settle_sec: 0.5
  action_debug: false
  action_debug_every_n: 30
  send_arms_parallel: true
  use_cartesian_servo_thread: true
  cartesian_servo_hz: 200.0
  cartesian_servo_alpha: 0.25
  gripper_reverse: false
  close_threshold: 0.5
  enable_on_connect: true
  clear_fault_on_connect: true
  switch_cartesian_mode_on_connect: true
  go_home_on_connect: true
  reset_go_home: true
  home_plan_name: "PLAN-Home"
  left_home_joints: [-0.17, -0.89, 0.13, 1.50, 0.85, 0.56, -0.71] # REPLACE_WITH_LEFT_HOME_JOINTS
  right_home_joints: [0.27, -0.91, 0.06, 1.82, -1.04, 0.56, 1.17] # REPLACE_WITH_RIGHT_HOME_JOINTS
  home_joint_max_vel: 1.0
  home_joint_max_acc: 2.0
  home_joint_tolerance: 0.01
  home_joint_timeout_sec: 20.0
  zero_ft_sensor_on_connect: false
  max_cartesian_delta: 0.02
  max_rotation_delta: 0.04
  cartesian_max_linear_vel: 0.8
  cartesian_max_angular_vel: 1.2
  cartesian_max_linear_acc: 3.0
  cartesian_max_angular_acc: 6.0
  # REPLACE_WITH_LEFT_MOUNT_DEG
  left_mount_raw_deg: 45.0
  left_mount_pitch_deg: 0.0
  left_mount_yaw_deg: 0.0
  # REPLACE_WITH_RIGHT_MOUNT_DEG
  right_mount_raw_deg: -45.0
  right_mount_pitch_deg: 0.0
  right_mount_yaw_deg: 0.0

  camera_read_timeout_ms: 2000
  camera_warmup_attempts: 15
  # Discard complete RGB-D frames before publishing observations. The quality
  # gate is derived from the training capture's valid-depth ratio (~0.90).
  camera_warmup_frames: 60
  camera_warmup_stability_window: 15
  camera_min_valid_depth_ratio: 0.75
  camera_max_valid_depth_ratio_range: 0.08
  camera_hardware_reset_on_connect: false
  camera_hardware_reset_on_release: false
  camera_reset_settle_sec: 6.0
  camera_reset_timeout_sec: 20.0

  timing_debug: false
  timing_debug_every_n: 1
  timing_warn_ms: 20.0

cameras:
  # REPLACE_WITH_CAM_CONFIG
  # left_wrist_cam_serial: "347622074728"
  # right_wrist_cam_serial: "346522076690"
  head_cam_serial: "344522070241"
  width: 640
  height: 480
