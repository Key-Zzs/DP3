# Canonical Flexiv DP3 PointCloudBuilder configuration.
#
# Merge policy for this file:
# - camera, pointcloud, crop, and sampling defaults come from this data_config.
# - the optional FFS routes below are consolidated in this file.
# - relative FFS artifact paths are relative to this file.
#
# The active deployment contract remains native_depth + xyz + 2048 points.
# The commented groups below are intentionally kept here so switching a route
# is explicit and cannot silently change the native runtime.

camera:
  name: head
  aligned_depth_to_color: false
  depth_scale: 0.0010000000474974513
  depth_intrinsics:
    width: 640
    height: 480
    fx: 392.5011901855469
    fy: 392.5011901855469
    cx: 316.7951354980469
    cy: 235.7994384765625
  color_intrinsics:
    width: 640
    height: 480
    fx: 606.177490234375
    fy: 606.6356201171875
    cx: 320.8212585449219
    cy: 256.06561279296875
pointcloud:
  use_rgb: false
  output_format: xyz

crop:
  enabled: true
  frame: camera
  x: [-0.4, 0.4]
  y: [-0.8, 0.2]
  z: [0.3, 1.2]

sampling:
  enabled: true
  mode: fps
  num_points: 2048
  voxel_size: 0.01
  pad_mode: repeat
  deterministic: true
  seed: 42

# Native depth is active. PointCloudBuilder spells this public native_depth
# mode as `depth_source.mode: frame`.
# depth_source:
#   mode: frame

# Optional depth-source groups.  To enable FFS, add one complete group below as
# the active depth_source mapping; do not mix artifact fields between routes.
#
# 1. PyTorch reference route:
# depth_source:
#   mode: ffs_stereo
#   ffs:
#     backend: pytorch
#     artifact_id: fp16_o3
#     left_key: left_ir
#     right_key: right_ir
#     checkpoint_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/model_best_bp2_serialize.pth
#     model_config_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/cfg.yaml
#     manifest_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/artifact_manifest_fp16_o3.json
#     calibration_path: null
#     calibration_camera: head
#     width: 640
#     height: 480
#     max_disp: 192
#     valid_iters: 8
#     precision: fp16
#     builder_optimization_level: 3
#     workspace_gib: 8.0
#     baseline_m: 0.05006292834877968
#     rectification_mode: auto
#     remove_invisible: true
#     min_disparity_px: 0.001
#     min_depth_m: 0.0
#
# 2. TensorRT single-engine route:
# depth_source:
#   mode: ffs_stereo
#   ffs:
#     backend: tensorrt_single
#     artifact_id: fp16_o3
#     left_key: left_ir
#     right_key: right_ir
#     engine_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_single_fp16_o3.engine
#     manifest_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_single_fp16_o3.manifest.json
#     config_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_single_fp16_o3.yaml
#     calibration_path: null
#     calibration_camera: head
#     width: 640
#     height: 480
#     max_disp: 192
#     valid_iters: 8
#     precision: fp16
#     builder_optimization_level: 3
#     workspace_gib: 8.0
#     baseline_m: 0.05006292834877968
#     rectification_mode: auto
#     remove_invisible: true
#     min_disparity_px: 0.001
#     min_depth_m: 0.0
#
# 3. TensorRT two-stage route:
depth_source:
  mode: ffs_stereo
  ffs:
    backend: tensorrt_two_stage
    artifact_id: fp16_o3
    left_key: left_ir
    right_key: right_ir
    feature_engine_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_two_stage_feature_fp16_o3.engine
    post_engine_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_two_stage_post_fp16_o3.engine
    manifest_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_two_stage_fp16_o3.manifest.json
    config_path: ../../../../PointCloudBuilder/ffs_reproduction/artifacts/tensorrt_two_stage_fp16_o3.yaml
    calibration_path: null
    calibration_camera: head
    width: 640
    height: 480
    max_disp: 192
    valid_iters: 8
    precision: fp16
    builder_optimization_level: 3
    workspace_gib: 8.0
    baseline_m: 0.05006292834877968
    rectification_mode: auto
    remove_invisible: true
    min_disparity_px: 0.001
    min_depth_m: 0.0
